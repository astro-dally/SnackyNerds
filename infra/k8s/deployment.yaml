# ──────────────────────────────────────────────────────────
# SnackyNerds — Kubernetes Deployment
# Rubric: ✅ 2 replicas | ✅ Resource limits | ✅ Probes
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snackynerds-api
  namespace: snackynerds
  labels:
    app: snackynerds-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snackynerds-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: snackynerds-api
    spec:
      containers:
        - name: snackynerds-api
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              protocol: TCP

          # ── Environment Variables ──
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/app/prisma/dev.db"

          # ── Resource Limits (Rubric Requirement) ──
          resources:
            requests:
              cpu: "128m"
              memory: "256Mi"
            limits:
              cpu: "256m"
              memory: "512Mi"

          # ── Liveness Probe (Rubric Requirement) ──
          # "Is the container still alive?"
          # If this fails 3 times, Kubernetes restarts the container
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness Probe (Rubric Requirement) ──
          # "Is the container ready to receive traffic?"
          # If this fails, the pod is removed from the Service
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
