# ──────────────────────────────────────────────────────────
# SnackyNerds — Kubernetes Service
# Rubric: ✅ Expose service endpoint
# ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: snackynerds-api
  namespace: snackynerds
  labels:
    app: snackynerds-api
spec:
  type: LoadBalancer
  selector:
    app: snackynerds-api
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      protocol: TCP
