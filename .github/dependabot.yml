version: 2
updates:
  # Client (npm - React/Vite)
  - package-ecosystem: 'npm'
    directory: '/client'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'client'
    allow:
      - dependency-type: 'direct'
    ignore:
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-router-dom'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'

  # Server (npm - Express/Node)
  - package-ecosystem: 'npm'
    directory: '/server'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'server'
    allow:
      - dependency-type: 'direct'
    ignore:
      - dependency-name: 'express'
      - dependency-name: 'cors'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
    open-pull-requests-limit: 3
    labels:
      - 'ci'
    commit-message:
      prefix: 'chore(ci):'
      include: 'scope'
