services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: snackynerds-server
    working_dir: /app
    environment:
      PORT: 5001
      DATABASE_URL: file:/app/prisma/dev.db
    command: >
      sh -c "
      npx prisma generate &&
      if [ ! -f prisma/dev.db ]; then
        npx prisma migrate deploy &&
        node prisma/seed.js;
      else
        npx prisma migrate deploy;
      fi &&
      npm run dev
      "
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: snackynerds-client
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:5001
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

volumes:
  client_node_modules:
  server_node_modules:
